<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1d64e8" />
  <title>Offline — School Platform</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .card { max-width: 480px; background: white; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04); padding: 32px; text-align: center; }
    .icon { font-size: 64px; }
    h1 { font-size: 24px; font-weight: 600; margin: 16px 0 8px; }
    p { color: #64748b; margin: 8px 0 24px; line-height: 1.5; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; font-weight: 500; text-decoration: none; margin: 4px; cursor: pointer; border: none; font-size: 14px; }
    .btn-primary { background: #1d64e8; color: white; }
    .btn-secondary { background: white; color: #1e293b; border: 1px solid #e2e8f0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>This page isn't cached and we can't reach the server. Check your connection, then try again.</p>
    <button class="btn btn-primary" onclick="location.reload()">Retry</button>
    <a class="btn btn-secondary" href="/">Home</a>
  </div>
</body>
</html>
